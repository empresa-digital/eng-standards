meta:
  pack: infra
  description: >
    Infrastructure / DevOps rules (containers, Kubernetes, CI/CD, secrets) that
    survive any shop. Cluster-name and pipeline specifics live in an org profile.
  language: en

rules:
  - id: infra-no-newline-in-secrets
    topic: Secrets
    severity: blocker
    lintable: false
    sources: [infra-001]
    principle: >
      When materializing a secret from the shell, don't let a trailing newline sneak
      in — `echo` appends `\n` by default.
    wrong:
      description: A subshell echo appends a newline into the secret value.
      code: |
        kubectl create secret generic verik --from-literal=AWS_KEY="$(echo VALUE)"
    right:
      description: Pass the value directly (or use echo -n / printf '%s').
      code: |
        kubectl create secret generic verik --from-literal=AWS_KEY=VALUE
    reason: >
      A stray trailing newline silently corrupts the secret and breaks HTTP headers
      (e.g. Authorization) when the value is used. Use echo -n, printf '%s', or no
      subshell at all.

  - id: infra-validate-secrets-after-create
    topic: Secrets
    severity: nit
    lintable: false
    sources: [infra-002]
    principle: After creating a secret, read it back and verify its exact bytes.
    wrong:
      description: Create the secret and trust it blindly.
      code: |
        kubectl create secret generic verik --from-literal=AWS_KEY=VALUE
        # nothing verifies what was stored
    right:
      description: Decode and inspect the raw bytes for stray characters.
      code: |
        kubectl create secret generic verik --from-literal=AWS_KEY=VALUE
        kubectl get secret verik -o jsonpath='{.data.AWS_KEY}' | base64 -d | od -c
    reason: >
      Secrets fail silently and are painful to debug in production. Decoding the stored
      value (od -c shows hidden bytes like a trailing newline) catches the error at
      creation time.

  - id: infra-set-resource-requests-and-limits
    topic: Kubernetes
    severity: blocker
    lintable: true
    sources: ["improvements#7"]
    principle: >
      Every container in a workload manifest declares CPU and memory resource requests
      and memory limits (no CPU limits).
    wrong:
      description: A container with no resources block — nothing bounds its consumption.
      code: |
        containers:
          - name: api
            image: myapp/api:1.2.3
            ports:
              - containerPort: 8080
    right:
      description: CPU and memory requests (for scheduling) plus a memory limit (to cap
        consumption) set explicitly; no CPU limit.
      code: |
        containers:
          - name: api
            image: myapp/api:1.2.3
            ports:
              - containerPort: 8080
            resources:
              requests: { cpu: 100m, memory: 128Mi }
              limits:   { memory: 256Mi }
    reason: >
      Without requests the scheduler can't place the pod sensibly and it becomes a noisy
      neighbor; without a memory limit one container can exhaust node memory and trigger
      evictions of its co-tenants. A CPU limit is deliberately omitted: CPU is compressible,
      so a limit only throttles the container while node capacity sits idle — the CPU
      request alone guarantees its fair share under contention. Explicit values make capacity
      predictable. (A namespace LimitRange can supply defaults — prefer setting them on the
      workload so the intent is visible.)

  - id: infra-define-health-probes
    topic: Kubernetes
    severity: blocker
    lintable: true
    sources: ["improvements#7"]
    principle: >
      Every long-running workload defines a readiness probe (gate traffic until ready)
      and a liveness probe (restart a hung pod).
    wrong:
      description: A Deployment container with no probes — traffic arrives before it is
        ready and a deadlocked process is never restarted.
      code: |
        containers:
          - name: api
            image: myapp/api:1.2.3
            ports:
              - containerPort: 8080
    right:
      description: Readiness gates traffic; liveness restarts a wedged process.
      code: |
        containers:
          - name: api
            image: myapp/api:1.2.3
            ports:
              - containerPort: 8080
            readinessProbe:
              httpGet: { path: /healthz, port: 8080 }
            livenessProbe:
              httpGet: { path: /healthz, port: 8080 }
              initialDelaySeconds: 10
    reason: >
      Without a readiness probe the Service routes requests to pods that aren't ready yet
      (failed requests during rollout and startup); without a liveness probe a hung or
      deadlocked process stays in rotation indefinitely because the orchestrator has no
      signal to restart it.
