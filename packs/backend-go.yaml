meta:
  pack: backend-go
  description: >
    Go + hexagonal-architecture rules that survive any Go shop. Tool-specific
    conventions (ORM, parser, test helpers) live in an org profile, not here.
  language: en

rules:
  - id: go-no-passthrough-service
    topic: Architecture
    severity: nit
    lintable: false
    sources: [be-001]
    principle: >
      Don't add a service method that only forwards to the repository. Call the
      repository directly from the controller.
    wrong:
      description: Service method that adds nothing over the repo call.
      code: |
        func (s *Service) GetUser(ctx context.Context, id int) (User, error) {
          return s.repo.GetUser(ctx, id)
        }
    right:
      description: Controller calls the repository directly.
      code: |
        func (ct *Controller) GetUser(c fiber.Ctx) error {
          user, err := ct.repo.GetUser(ctx, id)
          // ...
        }
    reason: A layer that only delegates adds complexity without value.

  - id: go-adapters-return-domain-errors
    topic: Architecture
    severity: blocker
    lintable: false
    sources: [be-002, be-009]
    principle: >
      Adapters translate external/library errors into domain errors. Callers must not
      need to know adapter-specific error types.
    wrong:
      description: Leak a library-specific error out of the adapter.
      code: |
        return cloudstorage.ErrFileNotFound
    right:
      description: Return a domain error (constructor name is org-specific).
      code: |
        return domain.NotFoundErr("file not found", nil)
    reason: >
      The whole point of an adapter is to translate external complexity into the
      domain language, so the controller can handle/propagate errors without knowing internals.

  - id: go-no-dto-for-few-values
    topic: Architecture
    severity: nit
    lintable: false
    sources: [be-003]
    principle: Don't create a struct just to return a couple of values.
    wrong:
      description: A result struct for two fields.
      code: |
        type Result struct { ID int; Version int }
    right:
      description: Use multiple returns, or mutate via pointer.
      code: |
        func CreateDocument(ctx context.Context, db DB, doc *Document) error {
          // sets doc.ID and doc.VersionID directly
        }
    reason: A throwaway DTO for a few values adds a type to maintain for no gain.

  - id: go-no-stuttering
    topic: Naming
    severity: nit
    lintable: true
    sources: [be-004]
    principle: Don't repeat the package name or struct name in its members.
    wrong:
      description: Member name repeats the package.
      code: |
        cache.CacheSet()
        cache.CacheGet()
    right:
      description: Drop the redundant prefix.
      code: |
        cache.Set()
        cache.Get()
    reason: The package qualifier already carries that information.

  - id: go-local-vars-lowercase
    topic: Naming
    severity: nit
    lintable: true
    sources: [be-006]
    principle: Local variables start lowercase to distinguish them from exported/global names.
    wrong:
      description: Local var capitalized like a type.
      code: |
        Firm := tt.Fake[Firm](t, customValues)
    right:
      description: Lowercase local var.
      code: |
        firm := tt.Fake[Firm](t, customValues)
    reason: Capitalized locals read as exported identifiers and confuse the reader.

  - id: go-json-camelcase
    topic: API
    severity: nit
    lintable: true
    sources: [be-007]
    principle: JSON tags use camelCase.
    wrong:
      code: |
        FirmID int `json:"FirmID"`
    right:
      code: |
        FirmID int `json:"firmId"`
    reason: camelCase is the JSON convention consumers expect.

  - id: go-api-paths-prefer-hyphen-to-underscore
    topic: API
    severity: nit
    lintable: true
    sources: [be-015]
    principle: Prefer hyphens over underscores in URL paths.
    wrong:
      code: |
        app.Post("/events/support_request", eventsController.SupportRequest)
    right:
      code: |
        app.Post("/events/support-request", eventsController.SupportRequest)
    reason: Browsers underline URLs, which can hide `_` characters; hyphens stay visible.

  - id: go-jwt-standard-claims
    topic: API
    severity: nit
    lintable: false
    sources: [be-016]
    principle: Use standard short JWT claim names (exp, iat, sub).
    wrong:
      code: |
        ExpiresAt int64 `json:"expiresAt"`
    right:
      code: |
        ExpiresAt int64 `json:"exp"`
    reason: JWT claims are sent on every request; standard short names are expected.

  - id: go-no-redundant-checks
    topic: Simplicity
    severity: nit
    lintable: false
    sources: [be-008]
    principle: Simplify checks when possible; don't re-check conditions unnecessarily.
    wrong:
      code: |
        userID, err := strconv.Atoi(c.Query("userID"))
        if err != nil { return err }
        if userID <= 0 { return errors.New("invalid userID") }

        value, ok := someInterface.(*User)
        if !ok || value == nil { return fmt.Errorf("invalid user") }
    right:
      code: |
        userID, _ := strconv.Atoi(c.Query("userID"))
        if userID <= 0 { return errors.New("invalid userID") }

        value, _ := someInterface.(*User)
        if value == nil { return fmt.Errorf("invalid user") }
    reason: Redundant checks only make the code larger and harder to read.

  - id: go-wrap-errors-not-stringify
    topic: Errors
    severity: nit
    lintable: false
    sources: [be-032]
    principle: Pass errors through unchanged so the parent can wrap them; don't call .Error() early.
    wrong:
      code: |
        return InternalErr("failed to create", map[string]any{"error": err.Error()})
        // or
        return fmt.Errorf("failed to create: %s", err)
    right:
      code: |
        return InternalErr("failed to create", map[string]any{"error": err})
        // or
        return fmt.Errorf("failed to create: %w", err)
    reason: Passing the error allows wrapping/unwrapping and is less verbose.

  - id: go-return-domain-entities
    topic: Architecture
    severity: nit
    lintable: false
    sources: [be-022]
    principle: >
      Repository functions return full domain entities, not single scalar fields.
    wrong:
      description: Function returns one column.
      code: |
        func GetDocumentVersionUploadID(...) (string, error)
    right:
      description: Return the entity; callers take what they need.
      code: |
        func GetDocumentVersion(...) (Document, error)
    reason: >
      Single-field accessors multiply and resist reuse. Returning the entity also lets
      one query validate ownership (firm, diligence) at the same time and reduces code
      duplication that would happen if we had many similar queries on the same tables.

  - id: go-inject-repo-not-db
    topic: Architecture
    severity: blocker
    lintable: false
    sources: [be-029]
    principle: Inject the repository into controllers, not the raw DB handle.
    wrong:
      code: |
        type FirmsController struct { db DB }
    right:
      code: |
        type FirmsController struct { repo *Repo }
    reason: Injecting the repo keeps separation of responsibilities and eases testing.

  - id: go-no-double-injection
    topic: Architecture
    severity: nit
    lintable: false
    sources: [be-019]
    principle: Inject each resource exactly one way.
    wrong:
      code: |
        type Controller struct {
          cacheService CacheService
          cache        Cache // same resource, second path
        }
    right:
      code: |
        type Controller struct { cacheService CacheService }
    reason: Two access paths to one resource invite inconsistency.

  - id: go-convert-types-at-boundaries
    topic: Architecture
    severity: blocker
    lintable: false
    sources: [be-031]
    principle: >
      Convert to domain types or abstracted types inside the adapter/controller.
      Type conversion in the middle of business logic signals the
      adapter returned the wrong type.
    wrong:
      code: |
        role, _ := repo.GetUserRoleInFirm(ctx, firmId, userId) // returns string
        if role != string(FirmRoleAdmin) { ... }               // conversion mid-logic

        // controller
        var dto struct{ StartTime string } // string will require conversion
        err = json.Unmarshal(body, &dto)
    right:
      code: |
        role, _ := repo.GetUserRoleInFirm(ctx, firmId, userId) // returns FirmRole
        if role != FirmRoleAdmin { ... }

        // controller
        var dto struct{ StartTime time.Time } // time.Time
        err = json.Unmarshal(body, &dto)
    reason: Boundaries own conversion; the rest of the code works with high-level/useful types.

  - id: go-validate-method-on-entity
    topic: Validation
    severity: blocker
    lintable: false
    sources: [be-034]
    principle: >
      Entity validation is a Validate() method on the entity, called after converting a
      DTO to the entity — not inline in the controller.
    wrong:
      code: |
        if payload.Party.CanonicalID == "" { return BadRequestErr("canonicalId required", nil) }
    right:
      code: |
        func (p Party) Validate() error {
          if p.CanonicalID == "" { return BadRequestErr("canonicalId required", nil) }
          return nil
        }
        // controller, after DTO -> entity:
        err := payload.Party.Validate()
        if err != nil { return err }
    reason: Centralizes validation, avoids duplication across controllers, eases unit testing.

  - id: go-validate-repo-inputs
    topic: Validation
    severity: nit
    lintable: false
    sources: [be-037]
    principle: >
      Repositories/adapters validate their own inputs; don't assume the controller did.
    wrong:
      code: |
        func (c *Repo) ListDiligences(ctx, filter Filter) ([]Diligence, error) {
          // uses filter.FirmID directly; firmID 0 silently returns nothing
        }
    right:
      code: |
        if filter.FirmID <= 0 { return nil, BadRequestErr("firmID must be positive", nil) }
    reason: >
      The repo may be reused by other routes. Validating here gives a clear error
      instead of a silent empty result or a confusing DB error. If validating a core
      concept, call the core invariant-validation functions inside the repo/adapter.

  - id: go-integrity-checks-in-adapter
    topic: Architecture
    severity: blocker
    lintable: false
    sources: [be-040]
    principle: Data-integrity rules belong in the repository/adapter, not the controller.
    wrong:
      code: |
        // controller
        if memberID == firm.OwnerID { return BadRequestErr("cannot remove owner", nil) }
        return f.repo.RemoveFirmMember(ctx, firmID, memberID)
    right:
      code: |
        // repository RemoveFirmMember
        if userID == firm.OwnerID { return BadRequestErr("cannot remove owner", nil) }
        // then DELETE
    reason: >
      A repo/adapter is responsible for making valid requests to external systems, so
      these validations must live inside the repo/adapter — not the controller, where
      another caller could bypass the check and corrupt the data. If validating a core
      concept, call the core invariant-validation functions inside the repo/adapter.

  - id: go-dtos-near-their-interface
    topic: Architecture
    severity: nit
    lintable: false
    sources: [be-036]
    principle: >
      A DTO used by a single port/interface is declared right below that interface (e.g. the
      contracts file), not buried in an adapter implementation.
    wrong:
      code: |
        type Provider interface{
          SendMessage(msg someotherpkg.Message) error
        }
    right:
      code: |
        type Provider interface{
          SendMessage(msg Message) error
        }

        type Message struct{ ... }
    reason: >
      DTOs are part of the interface contract. Separating them hurts readability and
      can cause import cycles or force the method out of the interface.

  - id: go-wrapper-near-delegate
    topic: Organization
    severity: nit
    lintable: false
    sources: [be-039]
    principle: A method that only delegates to a function sits immediately above that function.
    reason: Keeping the wrapper next to its delegate makes the relationship obvious.

  - id: go-modify-struct-in-place
    topic: Simplicity
    severity: nit
    lintable: false
    sources: [be-035]
    principle: >
      Mutate the original struct directly instead of building a temp and copying fields
      back.
    wrong:
      code: |
        party := Party{FirmID: d.FirmID, Kind: dp.Kind}
        db.Insert(ctx, PartiesTable, &party)
        d.Parties[i].ID = party.ID
        d.Parties[i].FirmID = party.FirmID
    right:
      code: |
        d.Parties[i].FirmID = d.FirmID
        db.Insert(ctx, PartiesTable, &d.Parties[i].Party)
    reason: Copying fields back is error-prone; mutate in place and you can't forget one.

  - id: go-time-json-default-format
    topic: API
    severity: nit
    lintable: false
    sources: [be-038]
    principle: Let the JSON encoder format time values; don't format them by hand.
    wrong:
      code: |
        "createdAt": dig.CreatedAt.Format(time.RFC3339Nano)
    right:
      code: |
        "createdAt": dig.CreatedAt
    reason: encoding/json already emits RFC3339; manual formatting risks inconsistency.

  - id: go-zero-value-over-pointer
    topic: Modeling
    severity: nit
    lintable: false
    sources: [db-002]
    principle: >
      Don't use a pointer just to signal "absent" when the zero value is already
      invalid. A pointer is only justified when zero is a legitimate value you must
      distinguish from unset.
    wrong:
      description: Pointer used only to express "unset", but a 0 quantity is invalid anyway.
      code: |
        type OrderItem struct {
          Quantity *int // nil = unset; but a 0-quantity item is invalid too
        }
    right:
      description: Use the value type; reject zero in validation.
      code: |
        type OrderItem struct {
          Quantity int // 0 is invalid, so it already means "unset"
        }
    reason: >
      A pointer adds nil-check noise and an extra allocation. When zero is already
      outside the valid range it doubles as the "absent" marker, so the pointer carries
      no extra information. Keep the pointer only when zero is meaningful and valid
      (e.g. a count that can legitimately be 0, distinct from "not provided").

  - id: go-no-model-fragmentation
    topic: Modeling
    severity: blocker
    lintable: false
    sources: [be-041]
    principle: >
      Don't create a struct with the same fields as an existing entity. Add the missing
      field to the entity (with omitempty if situational).
    wrong:
      code: |
        type FirmUserRow struct { ID int; Name string; Email string; Role string }
    right:
      code: |
        type User struct {
          ID int; Name string; Email string
          Role FirmRole `json:"role,omitempty"`
        }
    reason: >
      Parallel structs fragment the domain model. This is the Go-concrete form of
      u-reuse-before-adding and u-one-source-of-truth.

  - id: go-initialize-empty-slices-for-json
    topic: API
    severity: nit
    lintable: false
    sources: ["pr-review#397,419,430,454"]
    principle: >
      Initialize a slice that will be JSON-encoded with an empty literal (`[]T{}`), not
      left as a nil slice, so an empty result serializes to `[]` and not `null`.
    wrong:
      description: A nil slice is returned, so JSON encodes the empty case as null.
      code: |
        var comments []core.Comment
        err := db.Query(ctx, &comments, query, itemID)
        // empty result -> comments is nil -> JSON: "comments": null
        return comments, err
    right:
      description: Initialize the slice so the empty case serializes to [].
      code: |
        comments := []core.Comment{}
        err := db.Query(ctx, &comments, query, itemID)
        return comments, err
    reason: >
      A nil slice marshals to `null`, which commonly breaks front-end code that expects
      an array to iterate. An empty literal returns `[]`. Fix it at the repository layer
      so every caller benefits instead of each one guarding against null, and cover the
      empty-result case with a test.

  - id: go-no-query-in-loop
    topic: Performance
    severity: blocker
    lintable: false
    sources: ["pr-review#403,436,481,501"]
    principle: >
      Never query a datastore inside a loop (the N+1 pattern). Fetch every row you need in
      one set-based query.
    wrong:
      description: A per-item query in a loop — one network round-trip per element.
      code: |
        for _, id := range itemIDs {
          item, _ := c.repo.GetItem(ctx, id) // one round-trip per item
          results = append(results, item)
        }
    right:
      description: One set-based query covering all the rows.
      code: |
        err := c.db.Query(ctx, &results,
          "FROM items WHERE id = ANY($1) ORDER BY id", itemIDs)
    reason: >
      A query per iteration pays the full pod-to-datastore round-trip every time, so cost
      scales with the data and latency dominates the work — a real performance bug, not a
      style preference. Applies to any networked datastore, not just SQL.
    solution: >
      Fetch the whole set at once. This usually means adding a new repo method (e.g. a
      batched `ListByIDs`), or extending an existing method that already returns an entity
      to also return the related rows it naturally owns (a DDD aggregate), instead of
      looping over a single-item call.

  - id: go-combine-sequential-repo-queries
    topic: Performance
    severity: nit
    lintable: false
    sources: ["pr-review#403,436,481,501"]
    principle: >
      Inside the repo layer, prefer collapsing several sequential queries that answer one
      logical question into a single set-based query (a JOIN or `IN`) — when it doesn't
      cost clarity.
    wrong:
      description: Two separate round-trips to validate one request.
      code: |
        diligence, err := c.repo.GetDiligence(ctx, diligenceID)
        item, err := c.repo.GetItem(ctx, itemID)
    right:
      description: A single existence check joining the tables.
      code: |
        var count struct{ Count int `ksql:"c"` }
        err = c.db.QueryOne(ctx, &count,
          `SELECT count(*) AS c
          FROM diligences d
          JOIN diligence_items di
            ON d.id = di.diligence_id
          WHERE d.firm_id = $1
            AND di.id = $2`, firmID, itemID)
    reason: >
      Fewer round-trips is cheaper, but this is a judgment call, not an absolute — hence a
      nit, unlike the N+1 loop. It applies only inside the repo layer, where raw queries
      belong (callers above the repo must not write them). Weigh the tradeoff: several
      simple sequential calls are fine when they read more clearly than one combined query;
      but inside a transaction or a perf-sensitive path, saving a round-trip can justify a
      slightly more complex query.

  - id: go-no-durable-state-in-memory
    topic: Architecture
    severity: blocker
    lintable: false
    sources: ["pr-review#386,431"]
    principle: >
      Don't keep state that must survive across requests in process memory. Persist it
      to an external store.
    wrong:
      description: Per-user history kept in a package-level map; lost on restart.
      code: |
        var chatHistory = map[int][]Message{} // in-process, per-pod

        func appendMessage(userID int, m Message) {
          chatHistory[userID] = append(chatHistory[userID], m)
        }
    right:
      description: Read and write the state from a shared external store.
      code: |
        func appendMessage(ctx context.Context, userID int, m Message) error {
          return historyStore.Append(ctx, userID, m) // e.g. cache/db
        }
    reason: >
      Containers and pods are ephemeral — they restart for deploys, node rebalancing, or
      crashes at any time, dropping in-memory state. Anything that must outlive a single
      request (sessions, history, tokens, dedup keys) belongs in a shared external store,
      which also lets it work correctly across replicas. The specific store is an org
      choice; the rule is "not process memory".
