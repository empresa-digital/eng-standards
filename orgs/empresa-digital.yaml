meta:
  pack: org/empresa-digital
  description: >
    Rules that do NOT travel: bound to empresa-digital's stack (ksql, kbuilder, kparse,
    testtools, kpgx, Fiber) or to its house conventions. At a new company, leave these
    behind and write a new orgs/<company>.yaml. The universal + language packs carry over.
  language: en
  stack: [go, ksql, kbuilder, kparse, kpgx, fiber, testtools, vue, quasar, cypress]

rules:
  - id: ed-canonical-test-command
    topic: Workflow
    severity: blocker
    lintable: false
    sources: ["agent-improvements#15,23"]
    principle: >
      Use `make test` for validation. Don't run direct `go test` with custom GOCACHE or
      hand-picked package lists.
    wrong:
      code: |
        go test ./cmd/api -run='TestFoo' # to run a specific test
        go test ./... # to run all tests
    right:
      code: |
        make test path=./cmd/api args=-run='TestFoo' # to run a specific test
        make test # to run all tests
    reason: >
      The Makefile already handles Docker/integration setup; the Go cache invalidates
      itself correctly; tests are fast. Direct toolchain invocations create sandbox
      friction.

  - id: ed-repo-two-version-functions
    topic: Architecture
    severity: blocker
    lintable: false
    sources: ["agent-improvements#6,25", be-039]
    principle: >
      Repository operations come in two forms: a method on the client using the injected
      `c.db`, and a public function accepting a `ksql.Provider` (transaction-friendly).
      The method delegates to the public function — never duplicate the query.
    wrong:
      code: |
        func (c *Client) CreateDocument(ctx context.Context, doc *core.Document) error {
          // full query implementation duplicated here
        }
    right:
      code: |
        func (c *Client) CreateDocument(ctx context.Context, doc *core.Document) error {
          return CreateDocument(ctx, c.db, doc)
        }
        func CreateDocument(ctx context.Context, db ksql.Provider, doc *core.Document) error {
          // single query implementation
        }
    reason: One implementation, usable both inside and outside a transaction.

  - id: ed-list-funcs-use-kbuilder-and-pagination
    topic: Repository
    severity: blocker
    lintable: false
    sources: [db-003, "agent-improvements#7"]
    principle: >
      List repository functions use `kbuilder.Query` and accept pagination
      (offset/limit) plus conditional filters via WhereIf — unless a bounded-size
      invariant is proven.
    wrong:
      code: |
        query := "SELECT * FROM documents WHERE firm_id = $1"
        if filter.Kind != "" {
          query += " AND kind = $2"
          args = append(args, filter.Kind)
        }
        c.db.Query(ctx, query, args...)
    right:
      code: |
        var documents []Document
        err := c.db.QueryFromBuilder(ctx, &documents, kbuilder.Query{
          From:  "documents d",
          Where: kbuilder.Where("d.firm_id = %s", firmID).
            WhereIf(filter.Kind != "", "d.kind = %s", filter.Kind),
          Offset: offset,
          Limit: pageSize,
          OrderBy: "d.id",
        })
    reason: kbuilder is the company standard for listings — WhereIf, pagination, JOIN tag support.

  - id: ed-parse-json-with-kparse
    topic: Validation
    severity: nit
    lintable: false
    sources: [be-030]
    principle: Parse and validate request bodies with `kparse.ParseJSON` + validate tags.
    wrong:
      code: |
        if err := json.Unmarshal(c.Body(), &payload); err != nil { return err }
        if payload.Name == "" { return core.BadRequestErr("name is required", nil) }
    right:
      code: |
        var payload struct {
          Name string `json:"name" validate:"required,len<50"`
          Age  int    `json:"age" validate:"required,>18"`
        }
        if err := kparse.ParseJSON(c.Body(), &payload); err != nil {
          return core.BadRequestErr("invalid payload", map[string]any{"error": err})
        }
    reason: kparse handles required-field and other validations via tags, removing manual checks.

  - id: ed-insert-with-ksql-not-raw-sql
    topic: Repository
    severity: nit
    lintable: false
    sources: ["agent-improvements#25", be-033]
    principle: >
      Prefer `db.Insert()` with a named table struct and `ksql.NewTable(...)` rather than
      hand-written Exec/INSERT and manual JSON marshalling. Reuse the existing table
      struct if one exists.
    reason: >
      KSQL maps struct fields and JSON tags; a NewTable declaration lets the generated
      id be ignored while a unique key participates. Check unique-violation by error
      string instead of custom SQL.

  - id: ed-domain-error-constructors
    topic: Errors
    severity: nit
    lintable: false
    sources: [be-002, be-009]
    principle: >
      Domain errors use the `core` constructors: `core.NotFoundErr`, `core.BadRequestErr`,
      `core.InternalErr`, etc.
    reason: House naming for the domain-error pattern (the principle is in go-adapters-return-domain-errors).

  - id: ed-max-open-conns
    topic: Config
    severity: blocker
    lintable: false
    sources: [be-017, db-004]
    principle: Configure `MaxOpenConns` above the default of 1 when constructing the DB for production.
    wrong:
      code: |
        db, err := kpgx.New(ctx, dbURL, ksql.Config{})
    right:
      code: |
        db, err := kpgx.New(ctx, dbURL, ksql.Config{MaxOpenConns: 10})
    reason: >
      The default of 1 is fine for tests but a bottleneck in production. Don't hardcode a
      magic number blindly — pick a value to fit the workload (often via config); the 10
      above is just a reasonable starting point.

  - id: ed-storage-path-by-context
    topic: Storage
    severity: blocker
    lintable: false
    sources: [be-023]
    principle: >
      In object/KV stores with a shared key namespace (S3, Redis), identify objects by a
      fully-qualified key, not the bare file ID.
    wrong:
      code: |
        storage.GetUploadURL(ctx, uploadID, opts)
    right:
      code: |
        path := "firms/" + strconv.Itoa(firmID) + "/documents/" + uploadID
        storage.GetUploadURL(ctx, path, opts)
    reason: >
      Avoids future collisions, eases storage navigation, and enables bulk deletion
      (useful for LGPD).
